        - heading "Cited in CCN." [level=2] [ref=e34]
        - paragraph [ref=e35]: Three CCN articles that cite my commentary on agent wallets and the permission layer, AI trading-bot verifiability, and supply-chain risk from AI-generated code.
      - generic [ref=e36]:
        - 'link "CCN · Education Agent wallets and the permission layer What Are AI Agents: Types, Examples & Steps To Build One Read on CCN ↗" [ref=e37] [cursor=pointer]':
          - /url: https://www.ccn.com/education/crypto/ai-agents-how-to-create-based-ai-agent/
          - generic [ref=e38]:
            - generic [ref=e39]: CCN · Education
            - generic [ref=e40]: Agent wallets and the permission layer
          - 'heading "What Are AI Agents: Types, Examples & Steps To Build One" [level=3] [ref=e41]'
          - blockquote [ref=e42]: The real engineering work on agent wallets now sits at the permission layer, not the model layer. Scoped session keys, time-bound delegations and policy rulebooks that enforce spending caps and counterparty whitelists before any signature is produced are what separate an experimental agent from one that can be trusted with real funds. Revocation, audit logging and human override are no longer safeguards bolted on top, they are core infrastructure.
          - generic [ref=e43]: Read on CCN ↗
        - link "CCN · Education AI trading bots and verifiability How AI Crypto Trading Bots Make And Lose Millions Inside The Black Box Read on CCN ↗" [ref=e44] [cursor=pointer]:
          - /url: https://www.ccn.com/education/crypto/ai-crypto-trading-bots-how-they-make-and-lose-millions/
          - generic [ref=e45]:
            - generic [ref=e46]: CCN · Education
            - generic [ref=e47]: AI trading bots and verifiability
          - heading "How AI Crypto Trading Bots Make And Lose Millions Inside The Black Box" [level=3] [ref=e48]
          - blockquote [ref=e49]: The real black box is not the model, it is the gap between what the system did and what the user can verify. A bot can react quickly to noisy data, stale signals or overfitted patterns while still looking reliable, because the execution is automated and the outcome is visible even when the reasoning is not. Any system handling real capital needs tested risk limits, full audit logs of inputs and decisions, and human override paths, with the bot's tool integrations and data feeds treated as part of the attack surface.
          - generic [ref=e50]: Read on CCN ↗
        - 'link "CCN · Education AI-generated code and supply-chain risk AI Hallucinations & Slopsquatting: A Caution for Blockchain Devs Read on CCN ↗" [ref=e51] [cursor=pointer]':
          - /url: https://www.ccn.com/education/crypto/ai-hallucinations-slopsquatting-risk-for-blockchain-devs/
          - generic [ref=e52]:
            - generic [ref=e53]: CCN · Education
            - generic [ref=e54]: AI-generated code and supply-chain risk
          - 'heading "AI Hallucinations & Slopsquatting: A Caution for Blockchain Devs" [level=3] [ref=e55]'
          - blockquote [ref=e56]: The defence here is not careful prompting, it is treating AI suggestions like any other untrusted input. The fact that models confidently generate plausible-sounding package names that do not exist is what makes slopsquatting work, and no amount of better prompting closes that gap. Verifying package provenance, checking how recently a package was published and preferring audited libraries matters more than the prompt that produced the code. AI-generated code should reach production through the same review path as any third-party dependency, not a shorter one.
          - generic [ref=e57]: Read on CCN ↗
