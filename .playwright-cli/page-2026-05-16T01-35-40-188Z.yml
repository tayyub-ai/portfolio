        - generic [ref=e67]:
          - paragraph [ref=e68]: I'm a Senior Digital Analyst at 8 Million Stories in Stirling. Day-to-day I build reporting systems in BigQuery and Python, measurement pipelines in GA4 and GTM, and LLM-assisted workflows for classification, summarisation, and reporting QA. Most of the strongest work is private to clients. Recent engagements have been in media, financial services, consumer brands, insurance, pharma, and personal finance.
          - paragraph [ref=e69]: Outside that I write for Cointelegraph and AlphaWire, mostly on AI-driven trading and crypto-security. A few of those pieces have been cited as expert commentary, and I've peer-reviewed three book chapters for IGI Global. The writing page has the full record.
          - paragraph [ref=e70]: "I studied computer science at Stirling and have worked in analytics since. Most of the job is judgement: what the numbers can tell you and where they need an asterisk. LLMs make parts of it faster; they don't change what counts as a good answer. I'd rather ship one reporting workflow a team trusts than three they don't."
